<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小红书投放链接生成器</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px 30px;
            background-color: #f5f5f5;
            color: #333;
        }

        h1 {
            color: #fe2c55;
            text-align: center;
            margin-bottom: 30px;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        input {
            font-size: 14px;
        }

        textarea {
            font-size: 12px;
            min-height: 80px;
            resize: vertical;
            word-break: break-all;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #fe2c55;
        }

        button {
            background-color: #fe2c55;
            color: #fff;
            border: none;
            padding: 14px 28px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
        }

        button:hover {
            background-color: #e0244b;
        }

        .tabs {
            display: flex;
            margin-bottom: 20px;
            background: #fff;
            border-radius: 12px;
            padding: 6px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: #666;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .tab-btn.active {
            background-color: #fe2c55;
            color: #fff;
        }

        .result-item {
            margin-bottom: 16px;
        }

        .result-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .result-label span {
            font-weight: 600;
        }

        .copy-btn,
        .secondary-btn {
            width: auto;
            padding: 6px 12px;
            font-size: 12px;
        }

        .copy-btn {
            background-color: #4caf50;
        }

        .copy-btn:hover {
            background-color: #45a049;
        }

        .secondary-btn {
            background-color: #2196f3;
        }

        .secondary-btn:hover {
            background-color: #1976d2;
        }

        .template-btn {
            background-color: #ff9800;
        }

        .template-btn:hover {
            background-color: #fb8c00;
        }

        .inline-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .help-text {
            margin-top: 8px;
            color: #666;
            font-size: 13px;
            line-height: 1.5;
        }

        .result-panel {
            border: 1px solid #eee;
            border-radius: 10px;
            background: #fafafa;
            padding: 16px;
        }

        .result-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .result-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .meta-chip {
            display: inline-flex;
            align-items: center;
            padding: 6px 10px;
            border-radius: 999px;
            background: #fff;
            border: 1px solid #ececec;
            font-size: 12px;
            color: #666;
        }

        .action-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .section-title {
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #666;
        }

        .compact-preview {
            background: #fff;
            border: 1px solid #ececec;
            border-radius: 8px;
            overflow: hidden;
        }

        .csv-output {
            min-height: 240px;
            background: #fff;
            border: 1px solid #ececec;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 12px;
            line-height: 1.6;
        }

        .table-wrap {
            overflow: auto;
            max-height: 420px;
            background: #fff;
            border: 1px solid #ececec;
            border-radius: 6px;
        }

        .preview-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            table-layout: fixed;
        }

        .preview-table th,
        .preview-table td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
            vertical-align: top;
            word-break: break-all;
        }

        .preview-table th {
            position: sticky;
            top: 0;
            background: #fff7f9;
            color: #666;
            font-weight: 600;
            z-index: 1;
        }

        .preview-empty {
            padding: 18px 12px;
            color: #999;
            font-size: 12px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 8px;
            border-radius: 999px;
            background: #eef8f0;
            color: #2e7d32;
            font-size: 12px;
            white-space: nowrap;
        }

        .csv-details {
            margin-top: 14px;
            background: #fff;
            border: 1px solid #ececec;
            border-radius: 8px;
            overflow: hidden;
        }

        .csv-details summary {
            cursor: pointer;
            list-style: none;
            padding: 12px 14px;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            background: #fcfcfc;
            border-bottom: 1px solid #f3f3f3;
        }

        .csv-details summary::-webkit-details-marker {
            display: none;
        }

        .csv-details[open] summary {
            background: #fff7f9;
        }

        .csv-body {
            padding: 14px;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: #999;
            font-size: 14px;
        }

        @media (max-width: 640px) {
            body {
                margin: 16px auto;
                padding: 0 12px 20px;
            }

            .card,
            .tabs {
                padding: 16px;
            }

            .tabs {
                gap: 6px;
            }

            .inline-row,
            .result-label,
            .result-actions {
                flex-direction: column;
                align-items: stretch;
            }

            .copy-btn,
            .secondary-btn,
            .template-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <h1>小红书投放链接生成器</h1>

    <div class="tabs">
        <button class="tab-btn active" type="button" data-tab="single">单个生成</button>
        <button class="tab-btn" type="button" data-tab="batch">批量生成</button>
    </div>

    <div class="card tab-content" id="singleTab">
        <div class="form-group">
            <label for="appLink">投放链接（APP 链接）</label>
            <input type="text" id="appLink" placeholder="例如：https://mp.elong.com/tenthousandaura/?activitycode=xxx" value="https://mp.elong.com/tenthousandaura/?activitycode=7d11cd76-3678-4d3f-a001-c2431031fc7c&if=5017380&of=5079371">
        </div>
        <div class="form-group">
            <label for="refid">Refid</label>
            <input type="text" id="refid" placeholder="例如：123456" value="123456">
        </div>
        <div class="form-group">
            <label for="noteid">笔记 ID</label>
            <input type="text" id="noteid" placeholder="例如：123456789">
        </div>
        <button type="button" id="generateSingleBtn">生成链接</button>
    </div>

    <div class="card tab-content" id="batchTab" style="display: none;">
        <div class="form-group">
            <div class="inline-row">
                <label for="batchFile">上传文件（支持 `.txt` 或 `.csv`，推荐格式：`笔记ID,投放链接,refid`）</label>
                <button class="template-btn copy-btn" type="button" id="downloadTemplateBtn">下载 CSV 模板</button>
            </div>
            <input type="file" id="batchFile" accept=".txt,.csv">
            <div class="help-text" id="selectedFileText">未选择文件</div>
        </div>
        <button type="button" id="generateBatchBtn">批量生成</button>

        <div class="result-item" id="batchResult" style="display: none; margin-top: 20px;">
            <div class="result-label">
                <span>批量生成结果</span>
            </div>
            <div class="result-panel">
                <div class="result-actions">
                    <div class="result-meta">
                        <span class="meta-chip" id="batchRowCount">0 条结果</span>
                        <span class="meta-chip" id="batchColumnCount">0 个链接输出</span>
                    </div>
                    <div class="action-group">
                        <button class="copy-btn" type="button" data-copy-target="batchResultText">复制全部</button>
                        <button class="secondary-btn" type="button" id="downloadBatchCsvBtn">下载 CSV</button>
                    </div>
                </div>

                <div class="section-title">结果预览</div>
                <div class="compact-preview">
                    <div class="table-wrap">
                        <table class="preview-table">
                            <thead>
                                <tr id="batchPreviewHead"></tr>
                            </thead>
                            <tbody id="batchPreviewBody">
                                <tr>
                                    <td class="preview-empty">生成后会在这里显示预览</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <details class="csv-details">
                    <summary>查看原始 CSV 文本</summary>
                    <div class="csv-body">
                        <textarea id="batchResultText" class="csv-output" readonly></textarea>
                    </div>
                </details>
            </div>
        </div>
    </div>

    <div class="card" id="resultCard" style="display: none;">
        <h3 style="margin-bottom: 16px;">生成结果</h3>

        <div class="result-item">
            <div class="result-label">
                <span>DP (Deeplink) 链接</span>
                <button class="copy-btn" type="button" data-copy-target="dpResult">复制</button>
            </div>
            <textarea id="dpResult" readonly></textarea>
        </div>

        <div class="result-item">
            <div class="result-label">
                <span>Universal Link</span>
                <button class="copy-btn" type="button" data-copy-target="ulResult">复制</button>
            </div>
            <textarea id="ulResult" readonly></textarea>
        </div>

        <div class="result-item">
            <div class="result-label">
                <span>兜底链接</span>
                <button class="copy-btn" type="button" data-copy-target="fallbackResult">复制</button>
            </div>
            <textarea id="fallbackResult" readonly></textarea>
        </div>

        <div class="result-item">
            <div class="result-label">
                <span>监测链接</span>
                <button class="copy-btn" type="button" data-copy-target="trackResult">复制</button>
            </div>
            <textarea id="trackResult" readonly></textarea>
        </div>
    </div>

    <div class="footer">
        按你的确认版本整理完成，支持单个生成和更清爽的批量结果预览。
    </div>

    <script>
        const config = {
            dpPrefix: "tctclient://web/main?url=",
            ulPrefix: "https://m.17u.cn/app/links/web/main?url=",
            commonParams: "&btn_from=xhs&clickid=CLICK_ID&backXHS=XHS_BACK_URL&noteid=XHS_NOTE_ID&oaidmd5=OAID_MD5&caid=CAID&idfa=IDFA&ts=TS&creativeid=CREATIVITY_ID&unitid=UNIT_ID&campaignid=CAMPAIGN_ID&wakeRefid=",
            fallbackParams: "&wakeDM=xhs&wakeRefid=",
            trackBase: "https://appnew.ly.com/addap/attribution?aaid=53&os=__OS__&oaidmd5=__OAID_MD5__&caid=__CAID__&caidmd5=__CAID_MD5__&idfamd5=__IDFA__&imeimd5=__IMEI__&ts=__TS__&clickid=__CLICK_ID__&advertiserid=__ADVERTISER_ID__&creativeid=__CREATIVITY_ID__&unitid=__UNIT_ID__&campaignid=__CAMPAIGN_ID__&paid=__PAID__&keyword=__KEYWORD_ID__&noteid=__NOTE_ID__&wakeRefid="
        };

        const placeholderParams = {
            CLICK_ID: "__CLICK_ID__",
            XHS_BACK_URL: "__XHS_BACK_URL__",
            XHS_NOTE_ID: "__XHS_NOTE_ID__",
            OAID_MD5: "__OAID_MD5__",
            CAID: "__CAID__",
            IDFA: "__IDFA__",
            TS: "__TS__",
            CREATIVITY_ID: "__CREATIVITY_ID__",
            UNIT_ID: "__UNIT_ID__",
            CAMPAIGN_ID: "__CAMPAIGN_ID__"
        };

        let batchResults = "";

        function withPlaceholders(template) {
            return Object.entries(placeholderParams).reduce((result, [key, value]) => {
                return result.replaceAll(key, value);
            }, template);
        }

        function buildLinks({ appLink, refid }) {
            const encodedAppLink = encodeURIComponent(appLink);
            const commonParams = withPlaceholders(config.commonParams);

            return {
                dpLink: config.dpPrefix + encodedAppLink + commonParams + refid,
                ulLink: config.ulPrefix + encodedAppLink + commonParams + refid,
                fallbackLink: config.ulPrefix + encodedAppLink + config.fallbackParams + refid,
                trackLink: config.trackBase + refid
            };
        }

        function validateRequiredFields({ appLink, refid, noteId = "" }, lineLabel) {
            if (appLink !== appLink.trim() || refid !== refid.trim() || noteId !== noteId.trim()) {
                throw new Error(lineLabel + " 存在前后空格，请删除后重试");
            }

            if (!appLink.trim() || !refid.trim()) {
                throw new Error(lineLabel + " 的投放链接和 refid 不能为空");
            }
        }

        function escapeCsv(value) {
            const text = String(value ?? "");
            if (text.includes(",") || text.includes('"') || text.includes("\n")) {
                return '"' + text.replace(/"/g, '""') + '"';
            }
            return text;
        }

        function parseCsvLine(line) {
            const fields = [];
            let current = "";
            let inQuotes = false;

            for (let i = 0; i < line.length; i += 1) {
                const char = line[i];
                const nextChar = line[i + 1];

                if (char === '"') {
                    if (inQuotes && nextChar === '"') {
                        current += '"';
                        i += 1;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === "," && !inQuotes) {
                    fields.push(current);
                    current = "";
                } else {
                    current += char;
                }
            }

            fields.push(current);
            return fields.map((field) => field.trim());
        }

        function buildBatchPreview(rows) {
            const head = document.getElementById("batchPreviewHead");
            const body = document.getElementById("batchPreviewBody");

            head.innerHTML = "";
            body.innerHTML = "";

            if (!rows.length) {
                body.innerHTML = '<tr><td class="preview-empty">生成后会在这里显示预览</td></tr>';
                return;
            }

            const headers = ["笔记ID", "投放链接", "refid", "生成结果"];
            headers.forEach((header) => {
                const th = document.createElement("th");
                th.textContent = header;
                head.appendChild(th);
            });

            const previewRows = rows.slice(1, 11);
            previewRows.forEach((row) => {
                const tr = document.createElement("tr");

                const noteTd = document.createElement("td");
                noteTd.textContent = row[0] || "-";
                tr.appendChild(noteTd);

                const appTd = document.createElement("td");
                appTd.textContent = row[1] || "";
                tr.appendChild(appTd);

                const refidTd = document.createElement("td");
                refidTd.textContent = row[2] || "";
                tr.appendChild(refidTd);

                const statusTd = document.createElement("td");
                const badge = document.createElement("span");
                badge.className = "status-badge";
                badge.textContent = "4 个链接已生成";
                statusTd.appendChild(badge);
                tr.appendChild(statusTd);

                body.appendChild(tr);
            });

            if (!previewRows.length) {
                body.innerHTML = '<tr><td class="preview-empty" colspan="' + headers.length + '">没有可预览的数据</td></tr>';
            }
        }

        function parseBatchLine(line, index) {
            const lineLabel = "第 " + (index + 1) + " 行";

            if (line.includes(",")) {
                const parts = parseCsvLine(line);
                if (parts.length < 3) {
                    throw new Error(lineLabel + " 格式不正确，需要 `笔记ID,投放链接,refid` 三列");
                }

                return {
                    noteId: parts[0],
                    appLink: parts[1],
                    refid: parts[2],
                    lineLabel
                };
            }

            const parts = line.split(/\s+/).filter(Boolean);
            if (parts.length === 3) {
                return {
                    noteId: parts[0],
                    appLink: parts[1],
                    refid: parts[2],
                    lineLabel
                };
            }

            if (parts.length === 2) {
                return {
                    noteId: "",
                    appLink: parts[0],
                    refid: parts[1],
                    lineLabel
                };
            }

            throw new Error(lineLabel + " 格式不正确，需要 `笔记ID 投放链接 refid` 或 `投放链接 refid`");
        }

        function switchTab(tabName) {
            document.querySelectorAll(".tab-btn").forEach((button) => {
                button.classList.toggle("active", button.dataset.tab === tabName);
            });

            document.getElementById("singleTab").style.display = tabName === "single" ? "block" : "none";
            document.getElementById("batchTab").style.display = tabName === "batch" ? "block" : "none";

            if (tabName === "batch") {
                document.getElementById("resultCard").style.display = "none";
            }

            if (tabName === "single") {
                document.getElementById("batchResult").style.display = "none";
            }
        }

        function renderSingleResult(result) {
            document.getElementById("dpResult").value = result.dpLink;
            document.getElementById("ulResult").value = result.ulLink;
            document.getElementById("fallbackResult").value = result.fallbackLink;
            document.getElementById("trackResult").value = result.trackLink;
            document.getElementById("batchResult").style.display = "none";
            document.getElementById("resultCard").style.display = "block";
            document.getElementById("resultCard").scrollIntoView({ behavior: "smooth" });
        }

        function generateLinks() {
            try {
                const payload = {
                    appLink: document.getElementById("appLink").value,
                    refid: document.getElementById("refid").value,
                    noteId: document.getElementById("noteid").value
                };

                validateRequiredFields(payload, "当前输入");
                renderSingleResult(buildLinks({
                    appLink: payload.appLink.trim(),
                    refid: payload.refid.trim()
                }));
            } catch (error) {
                alert(error.message);
            }
        }

        function processBatchInput(inputText) {
            const lines = inputText.split(/\r?\n/).filter((line) => line.trim());
            if (!lines.length) {
                throw new Error("文件内容为空，请检查后重试");
            }

            const previewRows = [];
            const results = [];
            const headers = ["笔记ID", "投放链接", "refid", "DP链接", "Universal Link", "兜底链接", "监测链接"];
            results.push(headers.join(","));
            previewRows.push(headers);

            const firstLine = lines[0].toLowerCase();
            const startIndex = firstLine.includes("笔记id") || firstLine.includes("noteid") ? 1 : 0;

            for (let i = startIndex; i < lines.length; i += 1) {
                const item = parseBatchLine(lines[i].trim(), i);
                validateRequiredFields(item, item.lineLabel);
                const built = buildLinks({
                    appLink: item.appLink.trim(),
                    refid: item.refid.trim()
                });

                results.push([
                    escapeCsv(item.noteId.trim()),
                    escapeCsv(item.appLink.trim()),
                    escapeCsv(item.refid.trim()),
                    escapeCsv(built.dpLink),
                    escapeCsv(built.ulLink),
                    escapeCsv(built.fallbackLink),
                    escapeCsv(built.trackLink)
                ].join(","));

                previewRows.push([
                    item.noteId.trim(),
                    item.appLink.trim(),
                    item.refid.trim(),
                    built.dpLink,
                    built.ulLink,
                    built.fallbackLink,
                    built.trackLink
                ]);
            }

            batchResults = results.join("\n");
            document.getElementById("batchResultText").value = batchResults;
            document.getElementById("batchRowCount").textContent = (previewRows.length - 1) + " 条结果";
            document.getElementById("batchColumnCount").textContent = "4 个链接输出";
            buildBatchPreview(previewRows);
            document.getElementById("resultCard").style.display = "none";
            document.getElementById("batchResult").style.display = "block";
            document.getElementById("batchResult").scrollIntoView({ behavior: "smooth" });
        }

        function generateBatchLinks() {
            const fileInput = document.getElementById("batchFile");
            if (!fileInput.files.length) {
                alert("请先上传文件，可以先下载 CSV 模板填写后再上传");
                return;
            }

            const reader = new FileReader();
            reader.onload = function (event) {
                try {
                    processBatchInput(event.target.result);
                } catch (error) {
                    alert(error.message);
                }
            };
            reader.readAsText(fileInput.files[0], "utf-8");
        }

        function downloadBatchCsv() {
            if (!batchResults) {
                alert("还没有批量结果可下载");
                return;
            }

            const blob = new Blob([batchResults], { type: "text/csv;charset=utf-8;" });
            const url = URL.createObjectURL(blob);
            const anchor = document.createElement("a");
            anchor.href = url;
            anchor.download = "xhs-links-" + Date.now() + ".csv";
            document.body.appendChild(anchor);
            anchor.click();
            document.body.removeChild(anchor);
            URL.revokeObjectURL(url);
        }

        function downloadTemplate() {
            const templateContent = [
                "笔记ID,投放链接,refid",
                "6123456789,https://mp.elong.com/tenthousandaura/?activitycode=xxx,123456",
                "6987654321,https://mp.elong.com/another-activity/,789012"
            ].join("\n");

            const blob = new Blob([templateContent], { type: "text/csv;charset=utf-8;" });
            const url = URL.createObjectURL(blob);
            const anchor = document.createElement("a");
            anchor.href = url;
            anchor.download = "xhs-link-template.csv";
            document.body.appendChild(anchor);
            anchor.click();
            document.body.removeChild(anchor);
            URL.revokeObjectURL(url);
        }

        async function copyToClipboard(targetId, button) {
            const element = document.getElementById(targetId);
            const text = element.value;

            try {
                await navigator.clipboard.writeText(text);
                const originalText = button.textContent;
                button.textContent = "已复制";
                setTimeout(() => {
                    button.textContent = originalText;
                }, 1500);
            } catch (error) {
                alert("复制失败，请手动复制");
            }
        }

        document.querySelectorAll(".tab-btn").forEach((button) => {
            button.addEventListener("click", function () {
                switchTab(button.dataset.tab);
            });
        });

        document.getElementById("generateSingleBtn").addEventListener("click", generateLinks);
        document.getElementById("generateBatchBtn").addEventListener("click", generateBatchLinks);
        document.getElementById("downloadTemplateBtn").addEventListener("click", downloadTemplate);
        document.getElementById("downloadBatchCsvBtn").addEventListener("click", downloadBatchCsv);

        document.getElementById("batchFile").addEventListener("change", function (event) {
            const file = event.target.files[0];
            document.getElementById("selectedFileText").textContent = file ? "已选择文件：" + file.name : "未选择文件";
        });

        document.querySelectorAll("[data-copy-target]").forEach((button) => {
            button.addEventListener("click", function () {
                copyToClipboard(button.dataset.copyTarget, button);
            });
        });

        document.querySelectorAll("#singleTab input").forEach((input) => {
            input.addEventListener("keypress", function (event) {
                if (event.key === "Enter") {
                    generateLinks();
                }
            });
        });
    </script>
</body>
</html>
